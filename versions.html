<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>svelte-box demos</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #111111;
            --muted: #555555;
            --border: #eeeeee;
            --surface: #fafafa;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f10;
                --fg: #ececec;
                --muted: #a0a0a0;
                --border: #1f1f21;
                --surface: #18181a;
            }
        }
        html, body { background: var(--bg); color: var(--fg); }
        body {
            margin: 0;
            padding: 2rem 1.5rem;
            max-width: 720px;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        h1 { margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li {
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            background: var(--surface);
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
        }
        a {
            color: var(--fg);
            text-decoration: none;
            font-weight: 600;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        a:hover { text-decoration: underline; }
        .tag {
            font-size: 0.78rem;
            padding: 0.05rem 0.4rem;
            border-radius: 999px;
            background: var(--border);
            color: var(--muted);
        }
        footer {
            margin-top: 2rem;
            color: var(--muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>svelte-box demos</h1>
    <p>Every deployed version of the SvelteKit playground. <code>latest</code> tracks <code>master</code>; <code>v*</code> entries are pinned to release tags.</p>
    <ul>
        <li><a href="./">/</a><span class="tag">latest (master)</span></li>
    </ul>
    <footer>Generated 2026-05-15 20:29:54 UTC.</footer>
</body>
</html>
