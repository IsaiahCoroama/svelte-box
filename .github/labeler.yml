docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
      - all-globs-to-all-files:
          - '!src/**'
          - '!tests/**'
          - '!benchmarking/**'
          - '!.github/**'
          - '!.gitignore'
          - '!package.json'
          - '!bun.lock'
          - '!*.config.{js,ts}'
          - '!*.json'

internal:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - .gitignore
          - .prettierignore
          - .prettierrc
          - .npmrc
      - all-globs-to-all-files:
          - '!**/*.md'
          - '!src/**'
          - '!tests/**'
          - '!benchmarking/**'
  - head-branch:
      - '^bench/'
      - '^chore/'

feature:
  - head-branch:
      - '^feat/'

refactor:
  - head-branch:
      - '^refactor/'

bug:
  - head-branch:
      - '^fix/'

security:
  - head-branch:
      - '^security/'
  - changed-files:
      - any-glob-to-any-file:
          - 'SECURITY.md'

deps:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'bun.lock'

github_actions:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*.{yml,yaml}'

typescript:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.ts'

javascript:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.js'

svelte:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.svelte'

bun:
  - changed-files:
      - any-glob-to-any-file:
          - 'bun.lock'
