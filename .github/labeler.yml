docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
      - all-globs-to-all-files:
          - '!src/**'
          - '!tests/**'
          - '!benchmarking/**'
          - '!.github/**'
          - '!.gitignore'
          - '!package.json'
          - '!bun.lock'
          - '!*.config.{js,ts}'
          - '!*.json'

internal:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - .gitignore
          - .prettierignore
          - .prettierrc
          - .npmrc
      - all-globs-to-all-files:
          - '!**/*.md'
          - '!src/**'
          - '!tests/**'
          - '!benchmarking/**'

# `feature`, `bug`, `refactor`, `breaking`, and `security` are intent /
# judgment labels that file paths cannot tell apart. A change touching
# `src/lib/**` could be any of the first three. These are applied by
# the author or a maintainer on the PR; the label-checker workflow only
# requires that at least one classification label is present.

upgrade:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - bun.lock
