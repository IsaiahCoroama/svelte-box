# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sync develop to master

# Rebase or squash merges to master rewrite SHAs, leaving develop with
# stale originals. Force-reset develop to master after every master push
# so the integration branch stays a clean view of the release line.
# Safe because develop is single-maintainer and the reset is always a
# fast-forward in steady state.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: sync-develop
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Reset develop to master
    runs-on: ubuntu-latest
    permissions:
      contents: write # force-push develop
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push master to develop
        # `git cherry` filters out develop commits whose patch-id is on
        # master (rebase-merge originals). Anything left is real new work.
        run: |
          git fetch origin develop:refs/remotes/origin/develop
          UNIQUE=$(git cherry HEAD refs/remotes/origin/develop | grep '^+' || true)
          if [[ -n "$UNIQUE" ]]; then
            echo "::warning::develop has unique commits not on master:"
            echo "$UNIQUE"
            echo "Refusing to overwrite. Rebase develop onto master manually."
            exit 0
          fi
          git push \
            --force-with-lease=refs/heads/develop:refs/remotes/origin/develop \
            origin HEAD:refs/heads/develop
