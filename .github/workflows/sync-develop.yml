# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sync develop to master

# Rebase or squash merges to master rewrite SHAs, leaving develop with
# stale originals. Force-reset develop to master after every master push
# so the integration branch stays a clean view of the release line.
# Safe because develop is single-maintainer and the reset is always a
# fast-forward in steady state.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: sync-develop
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Reset develop to master
    runs-on: ubuntu-latest
    permissions:
      contents: write # force-push develop
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push master to develop
        # Squash and rebase merges both rewrite SHAs and patch boundaries,
        # so `git cherry` flags every still-on-develop commit as "unique"
        # even when the work has landed on master. Log unique commits as a
        # warning so a misuse of develop (direct pushes, branching from
        # develop) is visible in the run log, but always proceed with the
        # reset. The intent of this workflow is to keep develop at master;
        # single-maintainer guarantee plus the local clone retaining any
        # lost commits is the recovery story.
        run: |
          git fetch origin develop:refs/remotes/origin/develop
          UNIQUE=$(git cherry HEAD refs/remotes/origin/develop | grep '^+' || true)
          if [[ -n "$UNIQUE" ]]; then
            echo "::warning::develop had unique commits not on master, force-reset will drop them:"
            echo "$UNIQUE"
          fi
          git push \
            --force-with-lease=refs/heads/develop:refs/remotes/origin/develop \
            origin HEAD:refs/heads/develop
