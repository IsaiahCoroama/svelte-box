name: 'Conflict detector'

# SECURITY (pull_request_target): runs with base-branch token + write
# permissions. Must NOT check out PR head code, install PR-declared deps,
# or evaluate PR-controlled inputs in `run:` blocks. Any such addition
# reintroduces the standard privilege-escalation pattern.

on:
  pull_request_target:
    types: [opened, synchronize]

concurrency:
  group: detect-conflicts-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  main:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Check if PRs have merge conflicts
        uses: eps1lon/actions-label-merge-conflict@0273be72a0bbd58fcd71d0d6c02c209b50d1e5e1 # v3.1.0
        with:
          dirtyLabel: 'conflicts'
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          commentOnDirty: 'This pull request has a merge conflict that needs to be resolved.'
