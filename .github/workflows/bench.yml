name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    # Weekly run on Mondays at 06:00 UTC so regressions are visible.
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - 'src/lib/**'
      - 'benchmarking/**'
      - '.github/workflows/bench.yml'

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only
        run: bunx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run benchmarks (text)
        run: bun run bench | tee bench-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-output-${{ github.sha }}
          path: bench-output.txt
          retention-days: 90

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bench-output.txt', 'utf8');
            const summaryMatch = output.match(/BENCH\s+Summary[\s\S]*$/);
            const summary = summaryMatch ? summaryMatch[0] : output.slice(-4000);

            const marker = '<!-- svelte-box-bench-comment -->';
            const body = [
              marker,
              '## Benchmark results',
              '',
              'Compared against the realistic alternatives: raw `$state`, class with `$state` field, class accessor pair (`#cell` + get/set), and `$state({ value })` wrapper.',
              '',
              '<details><summary>Full output</summary>',
              '',
              '```',
              summary,
              '```',
              '',
              '</details>',
              '',
              `Commit: \`${context.sha.slice(0, 7)}\``
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
