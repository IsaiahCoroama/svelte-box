name: Benchmarks

on:
  pull_request:
    # `closed` fires on close-without-merge too; the job filter below
    # gates on `merged == true`.
    types: [closed]
    branches: [master]
    paths:
      - 'src/lib/**'
      - 'benchmarking/**'
      - '.github/workflows/bench.yml'

defaults:
  run:
    shell: bash -eo pipefail {0}

concurrency:
  group: bench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Run benchmarks
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only
        run: bunx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run benchmarks (text)
        run: bun run bench | tee bench-output.txt

      # Best-effort: missing baseline (first run, expired artifact)
      # leaves the diff empty, does not fail the workflow.
      - name: Download previous bench output for regression diff
        id: prev-bench
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'bench.yml',
              status: 'success',
              per_page: 10
            });
            const previous = runs.workflow_runs.find((r) => r.id !== context.runId);
            if (!previous) {
              core.info('No previous successful bench run found; skipping regression diff.');
              core.setOutput('found', 'false');
              return;
            }
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: previous.id
            });
            const artifact = artifacts.artifacts.find((a) => a.name.startsWith('bench-output-'));
            if (!artifact) {
              core.info('Previous run had no bench-output artifact; skipping regression diff.');
              core.setOutput('found', 'false');
              return;
            }
            const dl = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip'
            });
            fs.writeFileSync('prev-bench.zip', Buffer.from(dl.data));
            core.setOutput('found', 'true');

      - name: Unpack previous bench output
        if: steps.prev-bench.outputs.found == 'true'
        run: |
          mkdir -p prev-bench
          unzip -o prev-bench.zip -d prev-bench
          mv prev-bench/bench-output.txt prev-bench-output.txt

      # Informational only. Promote to blocking once noise floor known.
      - name: Compute bench regression report
        id: regression
        if: steps.prev-bench.outputs.found == 'true'
        run: |
          node <<'EOF'
            const fs = require('fs');
            const parseHz = (text) => {
              const map = new Map();
              const lines = text.split('\n');
              // Vitest bench rows start with "·" or "   ·" and have the
              // form "<name> <hz> <min> <max> <mean> ...". The hz column
              // is the first numeric field after the name.
              const row = /^\s*·\s+(.+?)\s{2,}([\d,]+(?:\.\d+)?)\s/;
              for (const line of lines) {
                const m = line.match(row);
                if (!m) continue;
                const name = m[1].trim();
                const hz = parseFloat(m[2].replace(/,/g, ''));
                if (Number.isFinite(hz)) map.set(name, hz);
              }
              return map;
            };
            const oldMap = parseHz(fs.readFileSync('prev-bench-output.txt', 'utf8'));
            const newMap = parseHz(fs.readFileSync('bench-output.txt', 'utf8'));
            const regressions = [];
            for (const [name, newHz] of newMap) {
              const oldHz = oldMap.get(name);
              if (oldHz === undefined) continue;
              const ratio = newHz / oldHz;
              if (ratio < 0.8) {
                regressions.push({ name, oldHz, newHz, dropPct: ((1 - ratio) * 100).toFixed(1) });
              }
            }
            let report = '';
            if (regressions.length === 0) {
              report = '_No benchmarks regressed by more than 20% vs the previous run._';
            } else {
              report = '⚠️ **Regressions detected (>20% slower vs previous run):**\n\n';
              report += '| Benchmark | Previous hz | Current hz | Drop |\n';
              report += '|---|---:|---:|---:|\n';
              for (const r of regressions) {
                report += `| \`${r.name}\` | ${r.oldHz.toLocaleString()} | ${r.newHz.toLocaleString()} | -${r.dropPct}% |\n`;
              }
            }
            fs.writeFileSync('regression-report.md', report);
          EOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-output-${{ github.sha }}
          path: bench-output.txt
          retention-days: 90

      - name: Comment results on merged PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bench-output.txt', 'utf8');
            const summaryMatch = output.match(/BENCH\s+Summary[\s\S]*$/);
            const summary = summaryMatch ? summaryMatch[0] : output.slice(-4000);

            let regressionReport = '_No previous bench run available for regression comparison._';
            try {
              regressionReport = fs.readFileSync('regression-report.md', 'utf8');
            } catch {
              // missing prev-run; placeholder above already set
            }

            const marker = '<!-- svelte-box-bench-comment -->';
            const body = [
              marker,
              '## Post-merge benchmark results',
              '',
              'Compared against the realistic alternatives: raw `$state`, class with `$state` field, class accessor pair (`#cell` + get/set), and `$state({ value })` wrapper.',
              '',
              '### Regression diff',
              '',
              regressionReport,
              '',
              '<details><summary>Full output</summary>',
              '',
              '```',
              summary,
              '```',
              '',
              '</details>',
              '',
              `Commit: \`${context.sha.slice(0, 7)}\``
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
