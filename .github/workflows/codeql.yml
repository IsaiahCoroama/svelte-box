name: CodeQL

# Path filter skips docs-only changes. Weekly cron is the safety net for
# advisories disclosed after the last code-touching merge.
on:
  push:
    branches: [master]
    paths: &codeql-paths
      - 'src/**'
      - 'tests/**'
      - 'benchmarking/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [master]
    paths: *codeql-paths
  schedule:
    - cron: '00 20 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3
        with:
          category: '/language:${{ matrix.language }}'
