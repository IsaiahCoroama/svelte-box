name: CodeQL

# Push-side path filter skips docs-only edits to master. Pull requests
# run CodeQL unconditionally because Scorecard's SAST check inspects
# the ~30 most recent merged PRs for a CodeQL run; a path filter that
# excluded most of those PRs reads as "no SAST" and dropped the score.
# Weekly cron is the safety net for advisories disclosed after the
# last code-touching merge.
on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benchmarking/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [master]
  schedule:
    - cron: '00 20 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF upload
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: '/language:${{ matrix.language }}'
