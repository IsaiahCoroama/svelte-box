name: Issue Manager

# SECURITY (pull_request_target + issues + issue_comment): manages
# issue/PR state via the GitHub API only. Must NOT check out code, run
# scripts, or consume PR-controlled inputs in `run:` blocks.
#
# POLICY: never apply `answered` to a security-tagged report without a
# landed fix. The label triggers a 10-day auto-close.

on:
  schedule:
    - cron: '00 20 * * *'
  issue_comment:
    types:
      - created
  issues:
    types:
      - labeled
  pull_request_target:
    types:
      - labeled
  workflow_dispatch:

concurrency:
  group: issue-manager-${{ github.event.issue.number || github.event.pull_request.number || 'cron' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  issue-manager:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: tiangolo/issue-manager@2fb3484ec9279485df8659e8ec73de262431737d # v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config: >
            {
              "answered": {
                "delay": 864000,
                "message": "Assuming the original need was handled, this will be automatically closed now. But feel free to add more comments or create new issues or PRs."
              },
              "waiting": {
                "delay": 2628000,
                "message": "As this PR has been waiting for the original user for a while but seems to be inactive, it's now going to be closed. But if there's anyone interested, feel free to create a new PR.",
                "reminder": {
                  "before": "P3D",
                  "message": "Heads-up: this will be closed in 3 days unless there's new activity."
                }
              },
              "invalid": {
                "delay": 0,
                "message": "This was marked as invalid and will be closed now. If this is an error, please provide additional details."
              }
            }
