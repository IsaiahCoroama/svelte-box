name: Issue Manager

# SECURITY (pull_request_target + issues + issue_comment): this workflow
# only manages issue and PR state (labels, comments, close actions) via
# the GitHub API. It does NOT check out repository code, does NOT run
# arbitrary scripts, and does NOT consume PR-controlled inputs in `run:`
# blocks. Do not add such steps without rewriting the triggers.
#
# Security-tagged reports must never be moved to the `answered` label
# without an explicit fix landing first: `answered` triggers a 10-day
# auto-close window, which is aggressive for a security disclosure.

on:
  schedule:
    - cron: '00 20 * * *'
  issue_comment:
    types:
      - created
  issues:
    types:
      - labeled
  pull_request_target:
    types:
      - labeled
  workflow_dispatch:

# Per-item concurrency so rapid comment/label events on the same issue or PR
# do not race. The cron sweep takes a singleton group.
concurrency:
  group: issue-manager-${{ github.event.issue.number || github.event.pull_request.number || 'cron' }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write

jobs:
  issue-manager:
    runs-on: ubuntu-latest
    steps:
      - uses: tiangolo/issue-manager@2fb3484ec9279485df8659e8ec73de262431737d # v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config: >
            {
              "answered": {
                "delay": 864000,
                "message": "Assuming the original need was handled, this will be automatically closed now. But feel free to add more comments or create new issues or PRs."
              },
              "waiting": {
                "delay": 2628000,
                "message": "As this PR has been waiting for the original user for a while but seems to be inactive, it's now going to be closed. But if there's anyone interested, feel free to create a new PR.",
                "reminder": {
                  "before": "P3D",
                  "message": "Heads-up: this will be closed in 3 days unless there's new activity."
                }
              },
              "invalid": {
                "delay": 0,
                "message": "This was marked as invalid and will be closed now. If this is an error, please provide additional details."
              }
            }
