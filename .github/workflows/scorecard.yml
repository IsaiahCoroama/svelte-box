name: OpenSSF Scorecard

# Surfaces supply-chain controls. Results: Security tab SARIF + public
# Scorecard dashboard.
on:
  push:
    branches: [master]
    # Score-affecting paths only. Weekly cron + dispatch are the safety
    # net for any path missed here.
    paths:
      - '.github/**'
      - 'SECURITY.md'
      - 'LICENSE'
      - 'package.json'
      - 'bun.lock'
      - 'CONTRIBUTING.md'
  schedule:
    - cron: '00 00 * * 1' # Monday 00:00 UTC
  workflow_dispatch:

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to upload SARIF
      id-token: write # required to publish results to the public dashboard
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # feeds README Scorecard badge
          publish_results: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          sarif_file: results.sarif
