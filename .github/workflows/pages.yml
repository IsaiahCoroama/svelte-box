# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy GitHub Pages

# Deploy gated on CI success on master so a broken push cannot ship.
# `workflow_dispatch` stays for manual redeploys (rollback, settings).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# `cancel-in-progress: false` so a half-deployed site is never published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  changes:
    name: Detect deployable changes
    runs-on: ubuntu-latest
    # workflow_dispatch context has no workflow_run.conclusion; the OR
    # passes it through.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      deploy: ${{ steps.detect.outputs.deploy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # HEAD~1 reachable for diff against previous master commit
          fetch-depth: 2

      - name: Compare head against previous master commit
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch -> deploy"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Defensive on shallow history (orphan branch, force push, first commit)
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "No previous commit reachable, deploying defensively"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files since previous master commit:"
          echo "$CHANGED"
          DEPLOY=false
          while IFS= read -r f; do
            case "$f" in
              src/*|static/*|package.json|bun.lock|svelte.config.js|vite.config.ts|tsconfig.json|.github/workflows/pages.yml)
                DEPLOY=true
                break
                ;;
            esac
          done <<< "$CHANGED"
          echo "deploy=$DEPLOY" >> "$GITHUB_OUTPUT"
          echo "Result: deploy=$DEPLOY"

  build:
    name: Build playground
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # workflow_run defaults to workflow's default branch; pin to
          # the CI head SHA so we deploy what was tested
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      # Defensive in case `prepare` is removed from package.json
      - run: bunx svelte-kit sync

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build static site
        env:
          # svelte.config.js reads BASE_PATH to set kit.paths.base
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bun run build:app

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
