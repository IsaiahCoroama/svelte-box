# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy GitHub Pages

# Gate the deploy on CI passing. The CI workflow runs lint, type-check, and
# the test suite on every push and pull request. We only deploy a new
# Pages build when CI on `master` finished successfully, so a direct push
# or admin override that breaks `master` cannot ship a broken site.
#
# `workflow_dispatch` stays available for manual redeploys (e.g. after a
# repo rename, a Pages settings change, or to roll back to the latest
# good commit by re-running the workflow).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Newer pushes wait for the in-flight one,
# they do not cancel it (a half-deployed site is worse than a delayed one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  changes:
    name: Detect deployable changes
    runs-on: ubuntu-latest
    # Skip everything when the upstream CI run did not succeed. For
    # `workflow_dispatch` invocations the `workflow_run` context is empty
    # and the conclusion check passes through.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      deploy: ${{ steps.detect.outputs.deploy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # Need HEAD~1 reachable so we can diff the merge commit against
          # the previous master state.
          fetch-depth: 2

      - name: Compare head against previous master commit
        id: detect
        run: |
          # Manual redeploy always proceeds (rollback, settings change,
          # etc.). Skip the diff check entirely in that case.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch -> deploy"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Defensive: if history is too shallow (orphan branch, force
          # push, first commit), deploy rather than skip.
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "No previous commit reachable, deploying defensively"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files since previous master commit:"
          echo "$CHANGED"
          DEPLOY=false
          while IFS= read -r f; do
            case "$f" in
              src/*|static/*|package.json|bun.lock|svelte.config.js|vite.config.ts|tsconfig.json|.github/workflows/pages.yml)
                DEPLOY=true
                break
                ;;
            esac
          done <<< "$CHANGED"
          echo "deploy=$DEPLOY" >> "$GITHUB_OUTPUT"
          echo "Result: deploy=$DEPLOY"

  build:
    name: Build playground
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # `workflow_run` checks out the workflow's default branch by
          # default, not the commit that triggered CI. Pin the ref to the
          # head SHA from the upstream CI run so we deploy exactly what
          # was tested.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      # Defensive: make sure SvelteKit's generated types are present even
      # if the `prepare` script is later removed from `package.json`.
      - run: bunx svelte-kit sync

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build static site
        env:
          # `actions/configure-pages` resolves the project's GitHub Pages
          # base path (e.g. `/svelte-box`) and exposes it as the `base_path`
          # output. Forwarded into the Vite build via `BASE_PATH`, which
          # `svelte.config.js` reads to set `kit.paths.base`.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bun run build:app

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
