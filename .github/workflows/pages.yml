# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy GitHub Pages

# SECURITY (gh-pages write): deploy job has `contents: write` for the
# `gh-pages` branch. Triggers: CI-gated `workflow_run` on master, `v*`
# tag pushes (maintainer push + ancestor-of-master enforced below),
# manual dispatch. No `pull_request` -- fork PRs cannot reach this.
# Every `${{ github.* }}` value used in a `run:` block routes through
# `env:` for defense in depth. Must NOT add untrusted-code triggers
# (`pull_request`, `issue_comment`, etc.) without isolating build from
# deploy.

# Layout on gh-pages:
# - `/` = generated `index.html` listing every version (regenerated
#   every deploy; tag list comes from `git tag -l 'v*'` so undeployed
#   tags surface as backfill candidates).
# - `/latest/` = master playground (deployed by `workflow_run` on CI
#   success).
# - `/v<tag>/` = tag playground (deployed by tag push; older tags are
#   built and copied in by the master deploy's backfill step).
#
# Pages source must be: Settings -> Pages -> "Deploy from a branch",
# branch = `gh-pages`, folder = `/ (root)`.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

# Serialize gh-pages writes so master and tag deploys cannot race.
# `cancel-in-progress: false` keeps a half-pushed tree off the site.
concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  changes:
    name: Detect deployable changes
    # Only the workflow_run path needs the diff heuristic; tag and
    # dispatch deploy unconditionally and skip this job.
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy: ${{ steps.detect.outputs.deploy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Literal `master` avoids `workflow_run.head_sha`, which
          # Scorecard's Dangerous-Workflow check flags despite our
          # `branches: [master]` filter on the trigger.
          ref: master
          fetch-depth: 2

      - name: Compare head against previous master commit
        id: detect
        run: |
          set -euo pipefail
          # Defensive on shallow history (orphan branch, force push, first commit)
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "No previous commit reachable, deploying defensively"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files since previous master commit:"
          echo "$CHANGED"
          DEPLOY=false
          while IFS= read -r f; do
            case "$f" in
              src/*|static/*|package.json|bun.lock|svelte.config.js|vite.config.ts|tsconfig.json|.github/workflows/pages.yml)
                DEPLOY=true
                break
                ;;
            esac
          done <<< "$CHANGED"
          echo "deploy=$DEPLOY" >> "$GITHUB_OUTPUT"
          echo "Result: deploy=$DEPLOY"

  deploy:
    name: Build and publish to gh-pages
    needs: changes
    # `always()` required: tag/dispatch leave `changes` skipped, which
    # would otherwise short-circuit this job.
    if: |
      always() && (
        (github.event_name == 'workflow_run' && needs.changes.result == 'success' && needs.changes.outputs.deploy == 'true') ||
        (github.event_name == 'push' && github.ref_type == 'tag') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    # Backfill in master deploys can rebuild many tags; give it room.
    timeout-minutes: 30
    permissions:
      contents: write # commit and push to gh-pages branch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Literal `master` for workflow_run (avoids the
          # Scorecard-flagged `workflow_run.head_sha`); `github.ref`
          # for tag/dispatch. If master moves between CI and this run,
          # the newer commit's CI queues another deploy on the
          # `gh-pages-write` concurrency group.
          ref: ${{ github.event_name == 'workflow_run' && 'master' || github.ref }}
          # Full history for the tag `merge-base` check and the
          # gh-pages worktree.
          fetch-depth: 0

      # Stop a tag placed on an off-master commit from publishing a
      # `/vX.Y.Z/` demo that never passed CI.
      - name: Verify tag commit is on master
        if: github.ref_type == 'tag'
        env:
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch origin master --quiet
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/master; then
            echo "::error::Tag commit $TAG_SHA is not an ancestor of master; refusing to deploy"
            exit 1
          fi
          echo "Tag commit is on master."

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      # Tag/dispatch skip CI's workflow_run gate; rerun the audit
      # `bun run lint` does.
      - name: Audit dependencies
        run: bun audit --audit-level=high

      # Defensive in case `prepare` is removed from package.json
      - run: bunx svelte-kit sync

      - name: Resolve deploy target
        id: target
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            # Tag must match the `v*` convention; rejects valid git
            # refs like `release-1` that would land at a wrong path.
            case "$REF_NAME" in
              v[0-9]*) ;;
              *)
                echo "::error::Tag '$REF_NAME' does not match expected v* shape"
                exit 1
                ;;
            esac
            echo "destination=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "label=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "base_path=/$REPO_NAME/$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            # Master goes to /latest/; `/` is the generated index.
            echo "destination=latest" >> "$GITHUB_OUTPUT"
            echo "label=latest" >> "$GITHUB_OUTPUT"
            echo "base_path=/$REPO_NAME/latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        env:
          # svelte.config.js bakes BASE_PATH into `build/` once; must
          # match the URL the artifact is served from.
          BASE_PATH: ${{ steps.target.outputs.base_path }}
        run: bun run build:app

      # An empty `build/` would stage at root and wipe `/`. Refuse
      # early.
      - name: Verify build output
        run: |
          set -euo pipefail
          if [[ ! -s build/index.html ]]; then
            echo "::error::Build produced no (or empty) index.html"
            exit 1
          fi

      - name: Prepare gh-pages worktree
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Distinguish "branch missing" from "fetch failed" because
          # orphan-init destroys whatever is on origin.
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add gh-pages-wt gh-pages
          else
            echo "gh-pages does not exist on origin; orphan-init"
            git worktree add --orphan -b gh-pages gh-pages-wt
            git -C gh-pages-wt commit --allow-empty -m "Init gh-pages"
          fi

      - name: Stage versioned content
        env:
          DEST: ${{ steps.target.outputs.destination }}
        run: |
          set -euo pipefail
          # Sweep stale root files left behind by old artifact-based
          # deploys; preserve every versioned subdir, the generated
          # index, and CNAME. Safe to run every deploy.
          find gh-pages-wt -maxdepth 1 -mindepth 1 \
            ! -name '.git' \
            ! -name 'latest' \
            ! -name 'v*' \
            ! -name 'CNAME' \
            ! -name 'index.html' \
            -exec rm -rf {} +
          # Stage the build into its own subdir; `build/.` trailing
          # dot copies contents in, not the dir.
          rm -rf "gh-pages-wt/$DEST"
          mkdir -p "gh-pages-wt/$DEST"
          cp -a build/. "gh-pages-wt/$DEST/"

      # Master deploy only: build and stage every `v*` tag that does
      # not already have a subdir on gh-pages. Each tag is built from
      # its own commit with that tag's lockfile, in a detached worktree
      # so the master checkout is unaffected. Build failures emit a
      # warning and skip without failing the whole deploy.
      - name: Backfill missing tags
        if: steps.target.outputs.destination == 'latest'
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          git fetch origin --tags --quiet
          REPO_ROOT="$PWD"
          MISSING=()
          while read -r TAG; do
            [[ -z "$TAG" ]] && continue
            [[ -d "$REPO_ROOT/gh-pages-wt/$TAG" ]] && continue
            MISSING+=("$TAG")
          done < <(git tag -l 'v[0-9]*')

          if [[ ${#MISSING[@]} -eq 0 ]]; then
            echo "No tags to backfill."
            exit 0
          fi

          echo "Backfilling: ${MISSING[*]}"
          for TAG in "${MISSING[@]}"; do
            echo "::group::Build $TAG"
            WT="$RUNNER_TEMP/backfill-$TAG"
            rm -rf "$WT"
            if ! git worktree add --detach "$WT" "$TAG" 2>&1; then
              echo "::warning::Backfill $TAG: worktree checkout failed; skipping"
              echo "::endgroup::"
              continue
            fi
            if (
              cd "$WT"
              bun install --frozen-lockfile &&
              bunx svelte-kit sync &&
              BASE_PATH="/$REPO_NAME/$TAG" bun run build:app
            ) && [[ -s "$WT/build/index.html" ]]; then
              mkdir -p "$REPO_ROOT/gh-pages-wt/$TAG"
              cp -a "$WT/build/." "$REPO_ROOT/gh-pages-wt/$TAG/"
              echo "Staged $TAG"
            else
              echo "::warning::Backfill $TAG: build failed or produced no index.html"
            fi
            git worktree remove --force "$WT" 2>/dev/null || rm -rf "$WT"
            echo "::endgroup::"
          done

      - name: Generate versions index
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          cd gh-pages-wt
          # Git ref names legally allow `&`, `<`, `>`; escape before
          # interpolating into the rendered page.
          esc() {
            printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' -e 's/"/\&quot;/g'
          }
          ESC_REPO=$(esc "$REPO_NAME")
          # `sort -V -r`: SemVer-ish newest-first. Pre-release suffixes
          # (`-rc.0`, `-beta.1`) sort before the matching final.
          TAGS=$(find . -maxdepth 1 -mindepth 1 -type d -name 'v*' -printf '%f\n' | sort -V -r || true)
          GENERATED_AT=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          {
            cat <<HTML
          <!doctype html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>$ESC_REPO demos</title>
              <style>
                  :root {
                      --bg: #ffffff;
                      --fg: #111111;
                      --muted: #555555;
                      --border: #eeeeee;
                      --surface: #fafafa;
                  }
                  @media (prefers-color-scheme: dark) {
                      :root {
                          --bg: #0f0f10;
                          --fg: #ececec;
                          --muted: #a0a0a0;
                          --border: #1f1f21;
                          --surface: #18181a;
                      }
                  }
                  html, body { background: var(--bg); color: var(--fg); }
                  body {
                      margin: 0;
                      padding: 2rem 1.5rem;
                      max-width: 720px;
                      font-family: ui-sans-serif, system-ui, sans-serif;
                  }
                  h1 { margin-top: 0; }
                  ul { list-style: none; padding: 0; }
                  li {
                      padding: 0.6rem 0.8rem;
                      border: 1px solid var(--border);
                      border-radius: 6px;
                      margin-bottom: 0.5rem;
                      background: var(--surface);
                      display: flex;
                      align-items: baseline;
                      gap: 0.6rem;
                  }
                  a {
                      color: var(--fg);
                      text-decoration: none;
                      font-weight: 600;
                      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                  }
                  a:hover { text-decoration: underline; }
                  .tag {
                      font-size: 0.78rem;
                      padding: 0.05rem 0.4rem;
                      border-radius: 999px;
                      background: var(--border);
                      color: var(--muted);
                  }
                  footer {
                      margin-top: 2rem;
                      color: var(--muted);
                      font-size: 0.85rem;
                  }
              </style>
          </head>
          <body>
              <h1>$ESC_REPO demos</h1>
              <p>Every deployed version of the SvelteKit playground. <code>latest</code> tracks <code>master</code>; <code>v*</code> entries are pinned to release tags.</p>
              <ul>
                  <li><a href="./latest/">/latest/</a><span class="tag">latest (master)</span></li>
          HTML
            for TAG in $TAGS; do
              ESC_TAG=$(esc "$TAG")
              cat <<HTML
                  <li><a href="./$ESC_TAG/">/$ESC_TAG/</a><span class="tag">$ESC_TAG</span></li>
          HTML
            done
            cat <<HTML
              </ul>
              <footer>Generated $GENERATED_AT.</footer>
          </body>
          </html>
          HTML
          } > index.html

      - name: Commit and push
        id: push
        env:
          LABEL: ${{ steps.target.outputs.label }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd gh-pages-wt
          git add -A
          if git diff --cached --quiet; then
            echo "No content changes; skipping push."
            exit 0
          fi
          git commit -m "Deploy $LABEL ($COMMIT_SHA)"
          git push origin gh-pages

      - name: Report deployed URL
        env:
          DEST: ${{ steps.target.outputs.destination }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          LABEL: ${{ steps.target.outputs.label }}
        run: |
          set -euo pipefail
          BASE="https://$REPO_OWNER.github.io/$REPO_NAME"
          {
            echo "## Pages deploy"
            echo ""
            echo "**Label:** \`$LABEL\`"
            echo "**Demo:** $BASE/$DEST/"
            echo "**Versions index:** $BASE/"
            echo ""
            echo "Pages CDN propagation typically lands within ~60s of the gh-pages push."
          } >> "$GITHUB_STEP_SUMMARY"
