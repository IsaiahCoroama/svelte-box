name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Decides whether the rest of the pipeline runs. Docs-only changes
    # (markdown, LICENSE, .gitignore, sibling workflows) set `source` to
    # false and the heavy jobs skip. Changes to ci.yml itself are NOT in
    # the ignore list: editing the workflow always re-runs it.
    name: Detect source changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `source` is true when the diff includes at least one path that
          # is NOT in any of the excluded groups below. `every` is required
          # so a file must satisfy ALL negation patterns (not just one) to
          # count as a match. With the default `some`, README.md would
          # match `!LICENSE` (it isn't LICENSE) and the filter would always
          # fire.
          predicate-quantifier: 'every'
          filters: |
            source:
              - '!**/*.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.github/workflows/bench.yml'
              - '!.github/workflows/pages.yml'
              - '!.github/workflows/publish.yml'

  lint:
    name: Lint and format check
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run check

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - name: Resolve Playwright cache path
        id: pw-path
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "path=$HOME/.cache/ms-playwright" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "path=$HOME/Library/Caches/ms-playwright" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "path=$LOCALAPPDATA\\ms-playwright" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pw-path.outputs.path }}
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      # `playwright install --with-deps` only works on Ubuntu (apt-based).
      # macOS and Windows don't have a system-deps step at all; just install
      # the browser binary.
      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Install Playwright system deps only (Linux)
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Install Playwright Chromium (macOS/Windows)
        if: runner.os != 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - run: bun run test

  build:
    name: Build package
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - run: bun run prepack

  ci-all-greens:
    name: ci-all-greens
    # Branch-protection hook: a single required check that passes when
    # every upstream job either succeeded or was deliberately skipped
    # because no source files changed. `if: always()` forces this job to
    # run even when an upstream job fails, so the failure surfaces here
    # instead of being silently skipped.
    if: always()
    needs: [changes, lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed or were skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          echo "changes=$CHANGES_RESULT lint=$LINT_RESULT test=$TEST_RESULT build=$BUILD_RESULT"
          # The detector must always succeed. If it failed, we cannot tell
          # whether the pipeline was correctly skipped.
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "changes job did not succeed."
            exit 1
          fi
          # lint/test/build each pass either by succeeding or by being
          # skipped (docs-only run). Anything else (failure, cancelled) is
          # an aggregator failure.
          for r in "$LINT_RESULT" "$TEST_RESULT" "$BUILD_RESULT"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Required job did not pass (got $r)."
              exit 1
            fi
          done
