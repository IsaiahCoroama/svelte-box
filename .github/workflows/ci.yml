name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Skip the heavy pipeline for docs/repo-mgmt changes. ci.yml itself
    # is intentionally NOT excluded so workflow edits always re-run.
    name: Detect source changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # `every` (vs default `some`): a file must satisfy ALL negation
          # patterns to count as a non-source change. Without this, README.md
          # would match `!LICENSE` and the filter would always fire.
          predicate-quantifier: 'every'
          filters: |
            source:
              # Prose / license / vcs hygiene
              - '!**/*.md'
              - '!LICENSE'
              - '!.gitignore'
              # Sibling workflows (do not affect lint, type-check, tests,
              # or audit on this PR; their own triggers cover them)
              - '!.github/workflows/bench.yml'
              - '!.github/workflows/pages.yml'
              - '!.github/workflows/publish.yml'
              - '!.github/workflows/codeql.yml'
              - '!.github/workflows/scorecard.yml'
              - '!.github/workflows/labeler.yml'
              - '!.github/workflows/issue-manager.yml'
              - '!.github/workflows/detect-conflicts.yml'
              - '!.github/workflows/sync-develop.yml'
              # Repo-management config (no runtime effect)
              - '!.github/dependabot.yml'
              - '!.github/labeler.yml'
              - '!.github/CODEOWNERS'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!.github/ISSUE_TEMPLATE/**'

  lint:
    name: Lint and format check
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run check

      # Blocking. For unfixed CVEs, add the ID to a documented ignore-list
      # rather than silencing this step.
      - name: Audit dependencies (low and above)
        run: bun audit --audit-level=low

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - name: Resolve Playwright cache path
        id: pw-path
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "path=$HOME/.cache/ms-playwright" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "path=$HOME/Library/Caches/ms-playwright" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "path=$LOCALAPPDATA\\ms-playwright" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pw-path.outputs.path }}
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      # `--with-deps` is apt-only (Linux). macOS/Windows: browser binary only.
      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Install Playwright system deps only (Linux)
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Install Playwright Chromium (macOS/Windows)
        if: runner.os != 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - run: bun run test

      # Linux only: macOS/Windows would duplicate the signal. Thresholds
      # in vitest.config.ts (90% lines/statements/functions, 80% branches).
      - name: Coverage (Linux only)
        if: runner.os == 'Linux'
        run: bun run test:coverage

      - name: Upload coverage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 30

  build:
    name: Build package
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - run: bun run prepack

  ci-all-greens:
    name: ci-all-greens
    # Single required check for branch protection. Passes if every
    # upstream job succeeded or was deliberately skipped (docs-only run).
    if: always()
    needs: [changes, lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed or were skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          echo "changes=$CHANGES_RESULT lint=$LINT_RESULT test=$TEST_RESULT build=$BUILD_RESULT"
          # detector failure = cannot tell if skip was deliberate
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "changes job did not succeed."
            exit 1
          fi
          for r in "$LINT_RESULT" "$TEST_RESULT" "$BUILD_RESULT"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Required job did not pass (got $r)."
              exit 1
            fi
          done
