name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - name: Resolve Playwright cache path
        id: pw-path
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "path=$HOME/.cache/ms-playwright" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "path=$HOME/Library/Caches/ms-playwright" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "path=$LOCALAPPDATA\\ms-playwright" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pw-path.outputs.path }}
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      # `playwright install --with-deps` only works on Ubuntu (apt-based).
      # macOS and Windows don't have a system-deps step at all; just install
      # the browser binary.
      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium --with-deps

      - name: Install Playwright system deps only (Linux)
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Install Playwright Chromium (macOS/Windows)
        if: runner.os != 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - run: bun run test

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - run: bun install --frozen-lockfile

      - run: bun run prepack

  ci-all-greens:
    name: ci-all-greens
    # Branch-protection hook: a single required check that passes only when
    # every other job (including all test matrix legs) succeeds. `if: always()`
    # forces this job to run even when an upstream job fails, so the failure
    # surfaces here instead of being skipped.
    if: always()
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          echo "lint=$LINT_RESULT test=$TEST_RESULT build=$BUILD_RESULT"
          if [[ "$LINT_RESULT" != "success" || "$TEST_RESULT" != "success" || "$BUILD_RESULT" != "success" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
