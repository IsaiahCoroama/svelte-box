name: Publish to npm

on:
  release:
    types: [published]

# `cancel-in-progress: false` so an in-flight publish completes before
# the next starts. Two parallel `npm publish` calls would race.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # required to attach SBOM to the GitHub Release
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # full history needed for tag-ancestry check below
          fetch-depth: 0

      - name: Verify release tag is on master
        # Defense in depth alongside the `v*` tag-protection ruleset.
        # Explicit `git fetch` because actions/checkout under a tag trigger
        # may not populate origin/master.
        run: |
          git fetch --no-tags --depth=1 origin master
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "Tag commit ${GITHUB_SHA} is not on master. Refusing to publish."
            exit 1
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only
        run: bunx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - run: bun run lint
      - run: bun run check
      - run: bun run test

      # `npm audit signatures` requires npm-format package-lock.json;
      # bun does not write one. Generate transiently without installing.
      - name: Generate transient package-lock.json for signature audit
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Verify dependency tarball signatures
        run: npm audit signatures

      - name: Verify release tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: bun run prepack

      - name: Generate SBOM (CycloneDX)
        id: sbom
        # `npx` not `bunx`: the tool's `npm --version` >=9 check rejects
        # bun's intercepted version. `--ignore-npm-errors` because npm's
        # internal `npm ls --json` flags bun-resolved peer deps as invalid.
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --ignore-npm-errors \
            --output-file sbom.cdx.json \
            --output-format JSON
        continue-on-error: true

      - name: Publish to npm
        # Pre-releases (hyphen in version, e.g. 0.2.0-rc.0) ship to
        # `next` dist-tag. Finals ship to `latest`.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" == *-* ]]; then
            echo "Pre-release detected ($PKG_VERSION) -> publishing under dist-tag 'next'"
            npm publish --provenance --access public --tag next
          else
            echo "Final release ($PKG_VERSION) -> publishing under dist-tag 'latest'"
            npm publish --provenance --access public
          fi

      - name: Attach SBOM to the GitHub Release
        # Skipped silently if SBOM step failed (continue-on-error)
        if: hashFiles('sbom.cdx.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" sbom.cdx.json --clobber
