name: Publish to npm

on:
  release:
    types: [published]

# `cancel-in-progress: false` so an in-flight publish completes before
# the next starts. Two parallel `npm publish` calls would race.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # required to attach release assets
      id-token: write # OIDC for npm provenance and Sigstore signing
      attestations: write # generate the GitHub-native build attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # full history needed for tag-ancestry check below
          fetch-depth: 0

      - name: Verify release tag is on master
        # Defense in depth alongside the `v*` tag-protection ruleset.
        # Explicit `git fetch` because actions/checkout under a tag trigger
        # may not populate origin/master.
        run: |
          git fetch --no-tags --depth=1 origin master
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "Tag commit ${GITHUB_SHA} is not on master. Refusing to publish."
            exit 1
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.x

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only
        run: bunx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - run: bun run lint
      - run: bun run check
      - run: bun run test

      # `npm audit signatures` requires npm-format package-lock.json;
      # bun does not write one. Generate transiently without installing.
      - name: Generate transient package-lock.json for signature audit
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Verify dependency tarball signatures
        run: npm audit signatures

      - name: Verify release tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: bun run prepack

      # Pack explicitly so the attestation and the published tarball
      # reference the same bytes. `--ignore-scripts` because the
      # `bun run prepack` step above already ran the lifecycle; without
      # it npm would re-run `prepack` here.
      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --ignore-scripts --json | jq -r '.[0].filename')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          ls -la "$TARBALL"

      - name: Generate SBOM (CycloneDX)
        id: sbom
        # `cdxgen` parses `bun.lock` directly. The previous tool
        # (`@cyclonedx/cyclonedx-npm`) ran `npm ls` against bun-installed
        # node_modules and produced ELSPROBLEMS noise on every run.
        run: npx --yes @cyclonedx/cdxgen@12 -o sbom.cdx.json -t bun .
        continue-on-error: true

      # Sigstore-signed SLSA build provenance for the exact tarball.
      # The bundle is what Scorecard's Signed-Releases check matches
      # (extensions `.sigstore` or `.intoto.jsonl`). `--provenance`
      # below covers the npm side; this covers the GitHub Release.
      - name: Generate build provenance attestation
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Stage signed bundle for release upload
        run: cp "${{ steps.attest.outputs.bundle-path }}" "${{ steps.pack.outputs.tarball }}.sigstore"

      - name: Publish to npm
        # Pre-releases (hyphen in version, e.g. 0.2.0-rc.0) ship to
        # `next` dist-tag. Finals ship to `latest`. Publishing from
        # the pre-packed tarball guarantees the attestation above
        # describes the exact same bytes npm receives.
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" == *-* ]]; then
            echo "Pre-release detected ($PKG_VERSION) -> publishing under dist-tag 'next'"
            npm publish "$TARBALL" --provenance --access public --tag next
          else
            echo "Final release ($PKG_VERSION) -> publishing under dist-tag 'latest'"
            npm publish "$TARBALL" --provenance --access public
          fi

      - name: Attach signed tarball, bundle, and SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set -euo pipefail
          UPLOADS=("$TARBALL" "$TARBALL.sigstore")
          # SBOM is best-effort (continue-on-error above); include it
          # only if cdxgen actually produced the file.
          if [[ -f sbom.cdx.json ]]; then
            UPLOADS+=("sbom.cdx.json")
          fi
          gh release upload "$GITHUB_REF_NAME" "${UPLOADS[@]}" --clobber
