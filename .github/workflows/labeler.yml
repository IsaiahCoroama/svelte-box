name: Labels

# SECURITY (pull_request_target): this event grants the base-branch token
# and PR-write permission. The labeler reads file paths from the PR diff
# (via the API) and the label-checker reads the PR's label set. Neither
# step checks out PR head code or executes PR-controlled scripts. Do not
# add `actions/checkout` steps that target PR head, do not pipe
# `pull_request.head.*` fields into `run:` blocks, and do not install
# dependencies declared in the PR's `package.json`.

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      # For label-checker
      - labeled
      - unlabeled

# Collapse redundant runs when a contributor flaps labels or pushes a
# rapid series of commits to the same PR.
concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled' }}
      - run: echo "Done adding labels"
  # Run this after labeler applied labels
  check-labels:
    needs:
      - labeler
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: docker://agilepathway/pull-request-label-checker@sha256:14f5f3dfda922496d07d53494e2d2b42885165f90677a1c03d600059b7706a61 # v1.6.65
        with:
          # `any_of` requires at least one of the listed labels. We use this
          # instead of `one_of` (exactly one) because most PRs are multi-
          # aspect — e.g. a security fix that also bumps a dep is both
          # `security` and `upgrade`. Intent labels (`feature`, `bug`,
          # `refactor`) and judgment labels (`security`, `breaking`) are
          # author/maintainer-applied; `docs`, `internal`, and `upgrade` are
          # auto-applied by the labeler step above based on file paths.
          any_of: breaking,security,feature,bug,refactor,upgrade,docs,internal
          repo_token: ${{ secrets.GITHUB_TOKEN }}
