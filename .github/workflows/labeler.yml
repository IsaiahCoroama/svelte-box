name: Labels

# SECURITY (pull_request_target): runs with base-branch token + PR-write
# permission. Must NOT check out PR head code, install PR-declared deps,
# or pipe `pull_request.head.*` into `run:` blocks.

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled' }}
      - run: echo "Done adding labels"
  check-labels:
    needs:
      - labeler
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: docker://agilepathway/pull-request-label-checker@sha256:14f5f3dfda922496d07d53494e2d2b42885165f90677a1c03d600059b7706a61 # v1.6.65
        with:
          # `any_of` = at least one (vs `one_of` = exactly one). PRs are
          # often multi-aspect.
          any_of: breaking,security,feature,bug,refactor,docs,internal,deps
          repo_token: ${{ secrets.GITHUB_TOKEN }}
