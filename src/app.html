<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="text-scale" content="scale" />
        %sveltekit.head%
        <script>
            // Pre-paint theme bootstrap. Reads the persisted choice
            // (or prefers-color-scheme as a fallback) and applies it
            // before the stylesheet renders so the page does not flash
            // the wrong theme. Wrapped in try because localStorage
            // throws in some privacy modes.
            (function () {
                try {
                    let stored = localStorage.getItem('svelte-box-theme');
                    let prefersDark = window.matchMedia(
                        '(prefers-color-scheme: dark)'
                    ).matches;

                    document.documentElement.dataset.theme =
                        stored === 'dark' || stored === 'light'
                            ? stored
                            : prefersDark
                              ? 'dark'
                              : 'light';
                } catch (e) {
                    document.documentElement.dataset.theme = 'light';
                }
            })();
        </script>
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
